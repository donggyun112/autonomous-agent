# docker-compose for the autonomous-agent daemon.
#
# Single service: `agent` runs `pnpm live` inside the container. The body
# (data/) is bind-mounted from the host so the agent's memory persists, and
# generations/ is bind-mounted so the host can observe molted shells.
#
# src/ is also bind-mounted during development — this lets you edit files on
# the host and have them take effect in the container without a rebuild.
# For production, remove the src/ mount and rebuild the image instead.
#
# Usage:
#   docker compose up              — start daemon, follow logs
#   docker compose up -d           — start daemon detached
#   docker compose run --rm agent cycle   — run one cycle
#   docker compose run --rm agent status  — check status
#   docker compose run --rm agent init <name>  — first birth
#
# Auth:
#   Anthropic: set ANTHROPIC_API_KEY in the host .env, or run
#   `docker compose run --rm agent login` to do the OAuth flow and save
#   credentials to ./data/.auth/oauth.json which persists across runs.
#   OpenAI: set AGENT_LLM=openai and OPENAI_API_KEY in the host .env.

services:
  agent:
    build:
      context: .
      dockerfile: Dockerfile
    # :current is the rolling tag — the molt protocol retags new images as
    # "current" so a restart picks them up automatically. When compose builds
    # from scratch, it also tags the built image as :current.
    image: autonomous-agent:current
    container_name: autonomous-agent
    restart: unless-stopped
    stdin_open: true
    tty: true
    working_dir: /agent
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - AGENT_ROOT=/agent
      - AGENT_DATA_DIR=/agent/data
      # Host-side paths for docker-in-docker molt test. docker -v paths are
      # resolved by the HOST daemon, not the container. These tell molt.ts
      # where the host's data/ and generations/ actually live.
      - AGENT_HOST_DATA_DIR=${PWD}/data
      - AGENT_HOST_GENERATIONS_DIR=${PWD}/generations
    volumes:
      - ./data:/agent/data
      - ./generations:/agent/generations
      # docker.sock — lets the agent build + run + retag images for self-molt.
      # This grants docker-level access to the host. Acceptable because the
      # agent code is trusted (ours) and the host is the user's own machine.
      - /var/run/docker.sock:/var/run/docker.sock
      # Dev convenience — bind mount src so changes take effect without rebuild.
      # Remove this line for production.
      - ./src:/agent/src
      # Molt needs these files to copy into build context
      - ./Dockerfile:/agent/Dockerfile:ro
      - ./.dockerignore:/agent/.dockerignore:ro
      - ./package.json:/agent/package.json
      - ./pnpm-lock.yaml:/agent/pnpm-lock.yaml
      - ./tsconfig.json:/agent/tsconfig.json
      - ./vitest.config.ts:/agent/vitest.config.ts
      # Shared /tmp — agent can leave files here that the host can see.
      - ./shared:/tmp/shared
